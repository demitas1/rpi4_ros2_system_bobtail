# bobtail 表示共有 tmpfs（disp-writer / display_bridge）。
# ROS2 コンテナ側 display_bridge が書き込み、ホスト側 disp-writer が読む。
# /run は root 所有の tmpfs（再起動で消える）なので tmpfiles.d で毎起動時に用意する。
# uid/gid 1000 = コンテナ ros2_user / 実機 demitas（両者が書けるように所有者を揃える）。
#
# 導入（実機で一度だけ）:
#   sudo cp host/tmpfiles.d/disp-shm.conf /etc/tmpfiles.d/disp-shm.conf
#   sudo systemd-tmpfiles --create /etc/tmpfiles.d/disp-shm.conf   # 即時反映（以降は起動時に自動）
#
# Type Path            Mode UID  GID  Age Argument
d      /run/disp-shm   0775 1000 1000 -
